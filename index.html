<!DOCTYPE html>
<html>
<head>
<title>LifeOS</title>
<style>
body{
font-family: Arial;
background:#0b1220;
color:white;
text-align:center;
padding:40px;
}

.card{
background:#111a2e;
padding:30px;
border-radius:12px;
width:400px;
margin:auto;
}

button{
padding:10px 20px;
background:#2bd47d;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>LifeOS</h1>

<div class="card">

<h2>Future Simulation</h2>

<p>Enter your yearly savings</p>

<input id="savings" type="number" placeholder="Savings per year">

<br><br>

<button onclick="simulate()">Run Simulation</button>

<p id="result"></p>

</div>

<script>

function simulate(){

let yearly = document.getElementById("savings").value;

let rate = 0.07;
let years = 20;

let total = 0;

for(let i=0;i<years;i++){
total = (total + Number(yearly)) * (1 + rate);
}

document.getElementById("result").innerText =
"Estimated wealth in 20 years: $" + Math.round(total);

}

</script>

</body>
</html>
